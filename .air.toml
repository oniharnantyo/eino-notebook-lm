root = "."
tmp_dir = "tmp"

[build]
  cmd = "go run main.go serve"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "bin", "testdata"]
  include_dir = []
  exclude_file = []
  delay = 1000
  stop_on_error = true
  log = "build-errors.log"
  send_interrupt = true
  kill_delay = "5s"

[log]
  time = false
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = false
